# ref: <https://wiki.metacubex.one/config/>

allow-lan: true
lan-allowed-ips:
  - 100.64.0.0/10 # tailscale
  - 127.0.0.0/8 # loopback
  - 172.16.0.0/12 # docker
  - ::1/128 # loopback
skip-auth-prefixes:
  - 127.0.0.0/8 # loopback
  - ::1/128 # loopback
mode: rule
log-level: warning
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
profile:
  store-selected: true
  store-fake-ip: true
unified-delay: true
tcp-concurrent: true
geo-auto-update: true

# ref: <https://dns.icoa.cn/>
dns:
  enable: true
  cache-algorithm: arc
  ipv6: true
  respect-rules: true
  default-nameserver:
    - system
    - 101.6.6.6 # TUNA DNS666
    - 119.29.29.29 # DNSPod Public DNS
    - 223.5.5.5 # 阿里云公共 DNS
  proxy-server-nameserver:
    - system
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  direct-nameserver:
    - system
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  nameserver:
    - system
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

mixed-port: 7892

tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
  dns-hijack:
    - udp://any:53
    - tcp://any:53
  strict-route: true

proxies: []

proxy-groups:
  - name: PROXY
    type: select
    proxies: []
    url: https://cp.cloudflare.com
    lazy: true
    expected-status: 204
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Proxy.png

rules:
  # domain
  - RULE-SET,domain-direct,DIRECT
  - RULE-SET,domain-domestic,DIRECT
  - RULE-SET,domain-local,DIRECT
  - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT # reject QUIC
  - RULE-SET,domain-ai,AI
  - RULE-SET,domain-crypto,Crypto
  # - RULE-SET,domain-download,Download
  # - RULE-SET,domain-stream,Stream
  - RULE-SET,domain-telegram,PROXY
  - RULE-SET,domain-global,PROXY

  # ipcidr
  - RULE-SET,ipcidr-domestic,DIRECT
  - RULE-SET,ipcidr-local,DIRECT
  # - RULE-SET,ipcidr-stream,Stream
  - RULE-SET,ipcidr-telegram,PROXY
  - RULE-SET,ipcidr-global,PROXY

  - MATCH,PROXY

__rule-providers-anchors:
  domain: &domain
    type: http
    behavior: domain
    format: mrs
    interval: 86400
  ipcidr: &ipcidr
    type: http
    behavior: ipcidr
    format: mrs
    interval: 86400

rule-providers:
  # 🤖 AI
  domain-ai:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/ai.domain.mrs
    path: ./ruleset/ai.domain.mrs

  # 🪙 Crypto
  domain-crypto:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/crypto.domain.mrs
    path: ./ruleset/crypto.domain.mrs

  # 🎯 Direct
  domain-direct:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/direct.domain.mrs
    path: ./ruleset/direct.domain.mrs

  # 📍 Domestic
  domain-domestic:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/domestic.domain.mrs
    path: ./ruleset/domestic.domain.mrs
  ipcidr-domestic:
    <<: *ipcidr
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/domestic.ipcidr.mrs
    path: ./ruleset/domestic.ipcidr.mrs

  # 📥 Download
  domain-download:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/download.domain.mrs
    path: ./ruleset/download.domain.mrs

  # 🌐 Global
  domain-global:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/global.domain.mrs
    path: ./ruleset/global.domain.mrs
  ipcidr-global:
    <<: *ipcidr
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/global.ipcidr.mrs
    path: ./ruleset/global.ipcidr.mrs

  # ♾️ Local
  domain-local:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/local.domain.mrs
    path: ./ruleset/local.domain.mrs
  ipcidr-local:
    <<: *ipcidr
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/local.ipcidr.mrs
    path: ./ruleset/local.ipcidr.mrs

  # 📺 Stream
  domain-stream:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/stream.domain.mrs
    path: ./ruleset/stream.domain.mrs
  ipcidr-stream:
    <<: *ipcidr
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/stream.ipcidr.mrs
    path: ./ruleset/stream.ipcidr.mrs

  # ✈️ Telegram
  domain-telegram:
    <<: *domain
    url: https://cdn.jsdelivr.net/gh/liblaf/route-rules@mihomo/mihomo/telegram.domain.mrs
